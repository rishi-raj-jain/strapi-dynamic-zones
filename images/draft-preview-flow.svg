<svg viewBox="0 0 700 195" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" font-size="11">
  <defs>
    <marker id="dp-arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ENTER DRAFT PREVIEW -->
  <text x="8" y="24" font-size="10" font-weight="700" letter-spacing="0.06em" fill="#92400e">ENTER DRAFT PREVIEW</text>

  <rect x="8" y="30" width="138" height="52" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="77" y="49" text-anchor="middle" font-weight="600" fill="#713f12">GET /api/preview</text>
  <text x="77" y="63" text-anchor="middle" fill="#713f12">?status=draft</text>
  <text x="77" y="77" text-anchor="middle" fill="#92400e">&amp;slug=home&amp;secret=…</text>

  <line x1="148" y1="56" x2="160" y2="56" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="162" y="30" width="108" height="52" rx="5" fill="#f6f6f7" stroke="#e1e3e5" stroke-width="1.5"/>
  <text x="216" y="52" text-anchor="middle" font-weight="600" fill="#374151">secret check</text>
  <text x="216" y="68" text-anchor="middle" fill="#15803d">✓ matched</text>

  <line x1="272" y1="56" x2="284" y2="56" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="286" y="30" width="132" height="52" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="352" y="52" text-anchor="middle" font-weight="600" fill="#713f12">draftMode()</text>
  <text x="352" y="68" text-anchor="middle" fill="#713f12">.enable()</text>

  <line x1="420" y1="56" x2="432" y2="56" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="434" y="30" width="258" height="52" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="563" y="49" text-anchor="middle" font-weight="600" fill="#713f12">redirect → /home</text>
  <text x="563" y="63" text-anchor="middle" fill="#713f12">isEnabled: true → status="draft"</text>
  <text x="563" y="77" text-anchor="middle" fill="#92400e">editors see unpublished blocks</text>

  <!-- EXIT PREVIEW -->
  <text x="8" y="122" font-size="10" font-weight="700" letter-spacing="0.06em" fill="#14532d">EXIT PREVIEW</text>

  <rect x="8" y="128" width="138" height="52" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="77" y="147" text-anchor="middle" font-weight="600" fill="#14532d">GET /api/preview</text>
  <text x="77" y="161" text-anchor="middle" fill="#14532d">?status=published</text>
  <text x="77" y="175" text-anchor="middle" fill="#166534">&amp;slug=home&amp;secret=…</text>

  <line x1="148" y1="154" x2="160" y2="154" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="162" y="128" width="108" height="52" rx="5" fill="#f6f6f7" stroke="#e1e3e5" stroke-width="1.5"/>
  <text x="216" y="150" text-anchor="middle" font-weight="600" fill="#374151">secret check</text>
  <text x="216" y="166" text-anchor="middle" fill="#15803d">✓ matched</text>

  <line x1="272" y1="154" x2="284" y2="154" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="286" y="128" width="132" height="52" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="352" y="150" text-anchor="middle" font-weight="600" fill="#14532d">draftMode()</text>
  <text x="352" y="166" text-anchor="middle" fill="#14532d">.disable()</text>

  <line x1="420" y1="154" x2="432" y2="154" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#dp-arr)"/>

  <rect x="434" y="128" width="258" height="52" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="563" y="147" text-anchor="middle" font-weight="600" fill="#14532d">redirect → /home</text>
  <text x="563" y="161" text-anchor="middle" fill="#14532d">isEnabled: false → status="published"</text>
  <text x="563" y="175" text-anchor="middle" fill="#166534">visitors see published content only</text>
</svg>
