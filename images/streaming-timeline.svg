<svg width="700" height="218" viewBox="0 0 700 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="st-title st-desc">
  <title id="st-title">Three Streaming Phases: What the User Sees</title>
  <desc id="st-desc">Three browser window panels showing the progression: at 0ms a uniform skeleton stack appears; at 200ms block-aware skeletons with correct heights replace it; at 500ms the hero and rich-text have rendered while the feature grid is still loading.</desc>

  <defs>
    <marker id="st-arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#10b981"/>
    </marker>
  </defs>

  <!-- card -->
  <rect width="700" height="218" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- title -->
  <text x="350" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#0f172a">Three Phases: What the User Sees</text>

  <!-- timeline bar -->
  <line x1="115" y1="32" x2="585" y2="32" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="115" cy="32" r="4" fill="#10b981"/>
  <circle cx="350" cy="32" r="4" fill="#10b981"/>
  <circle cx="585" cy="32" r="4" fill="#10b981"/>
  <text x="115" y="27" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">0 ms</text>
  <text x="350" y="27" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">~200 ms</text>
  <text x="585" y="27" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">~500 ms+</text>

  <!-- ── PANEL 1: generic skeleton ── -->
  <rect x="20" y="40" width="190" height="155" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="33" cy="49" r="3" fill="#f87171"/>
  <circle cx="44" cy="49" r="3" fill="#fbbf24"/>
  <circle cx="55" cy="49" r="3" fill="#4ade80"/>
  <line x1="20" y1="57" x2="210" y2="57" stroke="#e2e8f0" stroke-width="1"/>
  <!-- equal-height skeleton bars -->
  <rect x="30" y="65" width="170" height="48" rx="2" fill="#e2e8f0"/>
  <rect x="30" y="119" width="170" height="28" rx="2" fill="#e2e8f0"/>
  <rect x="30" y="153" width="170" height="36" rx="2" fill="#e2e8f0"/>
  <!-- caption -->
  <text x="115" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#475569">Generic skeleton</text>
  <text x="115" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">PageLayoutSkeleton</text>

  <!-- arrow 1 → 2 -->
  <line x1="214" y1="118" x2="249" y2="118" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>

  <!-- ── PANEL 2: block-aware skeletons ── -->
  <rect x="255" y="40" width="190" height="155" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="268" cy="49" r="3" fill="#f87171"/>
  <circle cx="279" cy="49" r="3" fill="#fbbf24"/>
  <circle cx="290" cy="49" r="3" fill="#4ade80"/>
  <line x1="255" y1="57" x2="445" y2="57" stroke="#e2e8f0" stroke-width="1"/>
  <!-- hero skeleton (tall) -->
  <rect x="265" y="65" width="170" height="68" rx="2" fill="#e2e8f0"/>
  <!-- richtext skeleton (short) -->
  <rect x="265" y="139" width="170" height="18" rx="2" fill="#e2e8f0"/>
  <!-- feature skeleton -->
  <rect x="265" y="163" width="170" height="26" rx="2" fill="#e2e8f0"/>
  <!-- caption -->
  <text x="350" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#475569">Block skeletons</text>
  <text x="350" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">layout fetch resolved</text>

  <!-- arrow 2 → 3 -->
  <line x1="449" y1="118" x2="484" y2="118" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>

  <!-- ── PANEL 3: content streaming in ── -->
  <rect x="490" y="40" width="190" height="155" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="503" cy="49" r="3" fill="#f87171"/>
  <circle cx="514" cy="49" r="3" fill="#fbbf24"/>
  <circle cx="525" cy="49" r="3" fill="#4ade80"/>
  <line x1="490" y1="57" x2="680" y2="57" stroke="#e2e8f0" stroke-width="1"/>
  <!-- hero rendered -->
  <rect x="500" y="65" width="170" height="62" rx="2" fill="#1e293b"/>
  <text x="585" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#ffffff">Your Big Heading</text>
  <rect x="543" y="94" width="84" height="16" rx="8" fill="#10b981"/>
  <text x="585" y="106" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#ffffff">Get started</text>
  <!-- richtext rendered -->
  <rect x="500" y="133" width="170" height="24" rx="2" fill="#f0fdf4"/>
  <text x="585" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#15803d">Rich text rendered</text>
  <!-- feature still loading -->
  <rect x="500" y="163" width="170" height="26" rx="2" fill="#e2e8f0"/>
  <text x="585" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">feature grid loading…</text>
  <!-- caption -->
  <text x="585" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#475569">Content streams in</text>
  <text x="585" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">independent Suspense</text>
</svg>
